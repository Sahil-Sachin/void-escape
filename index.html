<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Void Escape</title>
<style>
  body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; text-align:center; }
  canvas { display:block; margin:auto; background:#111; }
  #ui { position:absolute; top:10px; width:100%; font-size:20px; }
  #leaderboard { position:absolute; right:10px; top:50px; background:rgba(0,0,0,0.7); padding:10px; border-radius:10px; }
  #newRecord { color:yellow; font-size:24px; display:none; }
</style>
</head>
<body>

<div id="ui">
  Score: <span id="score">0</span> |
  High Score: <span id="high">0</span>
  <div id="newRecord">NEW RECORD!</div>
</div>

<div id="leaderboard">
  <b>Your All-Time Leaderboard</b>
  <ol id="scores"></ol>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x:180, y:500, w:40, h:40 };
let obstacles = [];
let score = 0;
let speed = 4;
let difficultyTimer = 0;
let maxObstacles = 2;

let highScore = parseInt(localStorage.getItem("high")) || 0;
document.getElementById("high").innerText = highScore;

let leaderboard = JSON.parse(localStorage.getItem("leaderboard") || "[]");

function updateLeaderboard(){
  let list = document.getElementById("scores");
  list.innerHTML="";
  leaderboard.forEach(s=>{
    let li=document.createElement("li");
    li.textContent=s;
    list.appendChild(li);
  });
}
updateLeaderboard();

async function saveScore(newScore){
  leaderboard.push(newScore);
  leaderboard.sort((a,b)=>b-a);
  leaderboard=leaderboard.slice(0,5);
  localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
  updateLeaderboard();
}

// Controls

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") player.x-=30;
  if(e.key==="ArrowRight") player.x+=30;
});

// NEW: Enemy types
function createEnemy(x,y){
  let typeRand = Math.random();

  if(typeRand < 0.6){
    return { x,y,w:40,h:40,type:"normal",speed:1,color:"red" };
  } else if(typeRand < 0.85){
    return { x,y,w:30,h:30,type:"fast",speed:2.2,color:"orange" };
  } else {
    return { x,y,w:60,h:60,type:"tank",speed:0.7,color:"purple" };
  }
}

function spawnObstacle(){
  let spawnCount = Math.min(2, maxObstacles - obstacles.length);

  for(let i=0;i<spawnCount;i++){
    obstacles.push(
      createEnemy(
        Math.random()*(canvas.width-40),
        -20-(i*60)
      )
    );
  }
}

function gameLoop(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,400,600);

  // stars
  for(let i=0;i<30;i++){
    ctx.fillStyle="white";
    ctx.fillRect((i*50+score/5)%400,(i*80)%600,2,2);
  }

  player.x = Math.max(0, Math.min(canvas.width-player.w, player.x));

  ctx.fillStyle="cyan";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  obstacles.forEach(o=>{
    o.y += speed * o.speed;

    ctx.fillStyle = o.color;
    ctx.fillRect(o.x,o.y,o.w,o.h);

    if(
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ){
      gameOver();
    }
  });

  obstacles = obstacles.filter(o=>o.y < 600);

  score++;
  difficultyTimer++;

  if(score>700 && maxObstacles<3) maxObstacles=3;
  if(score>1200 && maxObstacles<4) maxObstacles=4;
  if(score>2000 && maxObstacles<5) maxObstacles=5;
  if(score>2800 && maxObstacles<6) maxObstacles=6;

  if(difficultyTimer % 250 === 0) speed += 0.3;

  document.getElementById("score").innerText = score;

  if(score>highScore){
    highScore=score;
    localStorage.setItem("high",highScore);
    document.getElementById("high").innerText = highScore;
    document.getElementById("newRecord").style.display="block";
  }

  requestAnimationFrame(gameLoop);
}

function gameOver(){
  saveScore(score);
  alert("Game Over! Score: "+score);
  location.reload();
}

setInterval(spawnObstacle,180);

gameLoop();
</script>

</body>
</html>
